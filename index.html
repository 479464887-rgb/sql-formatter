<!DOCTYPE html>
<html lang="en">

<head>
<meta property="og:title" content="Sql Formatter — DevKit">
<meta property="og:description" content="Free online Sql Formatter tool — fast, simple, and no signup required.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://479464887-rgb.github.io/sql-formatter/">
<meta name="twitter:card" content="summary">
<link rel="canonical" href="https://479464887-rgb.github.io/sql-formatter/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠</text></svg>">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Sql Formatter — DevKit Tools</title>
  <meta name="description" content="在线 SQL Format工具 - 美化/Compress SQL 语句，支持多种方言">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #58a6ff
    }

    .logo span {
      color: #f0c040
    }

    header .badge {
      font-size: 10px;
      background: #daa520;
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px
    }

    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 24px;
      flex: 1
    }

    .tool-wrapper {
      padding: 20px 0
    }

    footer {
      padding: 16px 24px;
      border-top: 1px solid #21262d;
      text-align: center;
      font-size: 12px;
      color: #484f58
    }

    footer a {
      color: #58a6ff;
      text-decoration: none;
      margin: 0 8px
    }

    .btn-primary:hover {
      background: #2ea043 !important
    }

    .btn:hover {
      background: #30363d !important
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #58a6ff !important
    }

    .btn {
      font-family: inherit
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">🛠 <span>Dev</span>Kit<span class="badge">BETA</span></div>
    <div style="font-size:11px;color:#8b949e">🔒 Processed locally · 数据不Upload</div>
  </header>
  <main>
    <h1 style="font-size:24px;margin-bottom:4px">SQL Formatter</h1>
    <p style="color:#8b949e;font-size:14px;margin-bottom:8px">在线 SQL Format工具 - 美化/Compress SQL 语句，支持多种方言</p>
    <div class="tool-wrapper"><textarea id="sql-input" placeholder="SELECT id,name,email FROM users WHERE status='active' ORDER BY created_at DESC LIMIT 10;" rows="6" style="width:100%;padding:16px;font-size:13px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#c9d1d9;resize:vertical;outline:none;font-family:mono;line-height:1.6"></textarea>
      <div style="display:flex;gap:8px;margin:12px 0"><button class="btn btn-primary" style="padding:10px 24px;background:#238636;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px" onclick="fmtSQL()">✨ Format</button><button class="btn" style="padding:10px 20px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:8px;cursor:pointer;font-size:13px" onclick="minSQL()">📦 Compress</button><button class="btn" style="padding:10px 20px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:8px;cursor:pointer;font-size:13px" onclick="copySQL()">📋 Copy</button></div><textarea id="sql-output" placeholder="Format结果..." readonly rows="8" style="width:100%;padding:16px;font-size:13px;border:1px solid #30363d;border-radius:8px;background:#161b22;color:#c9d1d9;resize:vertical;outline:none;font-family:mono;line-height:1.6;min-height:150px"></textarea>
    </div>
  </main>
  <footer><a href="https://github.com/479464887-rgb/sql-formatter">GitHub</a><span>·</span><span>© 2026 DevKit</span></footer>
  <script>
    function fmtSQL() {
      const s = document.getElementById('sql-input').value.trim();
      if (!s) return;
      let r = s.replace(/\s+/g, ' ').replace(/\s*,\s*/g, ',\n  ').replace(/\b(SELECT|FROM|WHERE|AND|OR|ORDER BY|GROUP BY|HAVING|LIMIT|JOIN|LEFT JOIN|RIGHT JOIN|INNER JOIN|OUTER JOIN|ON|SET|INSERT INTO|VALUES|UPDATE|DELETE FROM|CREATE TABLE|ALTER TABLE|DROP TABLE|UNION|AS|DISTINCT|BETWEEN|LIKE|IN|IS|NOT|NULL)\b/gi, '\n$1').replace(/\n\n/g, '\n').trim();
      document.getElementById('sql-output').value = r
    }

    function minSQL() {
      const s = document.getElementById('sql-input').value.trim();
      if (!s) return;
      document.getElementById('sql-output').value = s.replace(/\s+/g, ' ').trim()
    }

    function copySQL() {
      navigator.clipboard.writeText(document.getElementById('sql-output').value)
    }
  </script>
</body>

</html>
